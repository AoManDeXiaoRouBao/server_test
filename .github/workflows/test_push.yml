name: Server Chan Test Push

on:

  workflow_dispatch:

jobs:
  test-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          pip install requests

      - name: 运行测试脚本
        env:
          # 将 GitHub Secret 注入为环境变量
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
        run: |
          python server_test.py
