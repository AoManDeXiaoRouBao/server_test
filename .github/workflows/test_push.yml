name: Server Chan Test Push

on:
  # 1. 定时触发 (Cron 表达式)
  # 语法：分 时 日 月 周 (使用 UTC 时间)
  # 下面这个例子是：每天 UTC 时间 00:00 和 12:00 运行
  # 北京时间 = UTC + 8，所以这对应北京时间的 08:00 和 20:00
  schedule:
    - cron: '*/3 * * * *'
  
  # 2. 手动触发 (方便你随时测试，不用等定时)
  # 在 GitHub 页面点击 Actions -> 选择 workflow -> Run workflow
  

jobs:
  test-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          pip install requests

      - name: 运行测试脚本
        env:
          # 将 GitHub Secret 注入为环境变量
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
        run: |
          python server_test.py
